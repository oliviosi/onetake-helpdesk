<div class="clientes-page">
    <div class="page-header">
        <div>
            <h1>Clientes</h1>
            <p>Gerencie os clientes que podem abrir chamados no HelpDesk.</p>
        </div>

        <button pButton type="button" label="Novo cliente" icon="pi pi-plus" (click)="abrirNovo()"></button>
    </div>

    <div *ngIf="erro" class="message-area">
        <p-message severity="error" [text]="erro"></p-message>
    </div>

    <div *ngIf="sucesso" class="message-area">
        <p-message severity="success" [text]="sucesso"></p-message>
    </div>

    <div class="card">
        <div *ngIf="carregando" class="loading-area">
            <p-progressSpinner></p-progressSpinner>
        </div>

        <p-table *ngIf="!carregando" [value]="clientes" [paginator]="true" [rows]="10"
            [rowsPerPageOptions]="[10, 20, 50]" [globalFilterFields]="['dscCliente', 'email', 'codClienteERP']"
            responsiveLayout="scroll" styleClass="p-datatable-sm">
            <ng-template pTemplate="caption">
                <div class="table-caption">
                    <strong>Clientes cadastrados</strong>

                    <button pButton type="button" icon="pi pi-refresh" label="Atualizar" severity="secondary"
                        [outlined]="true" (click)="carregarClientes()"></button>
                </div>
            </ng-template>

            <ng-template pTemplate="header">
                <tr>
                    <th style="width: 90px">Código</th>
                    <th>Cliente</th>
                    <th>Email</th>
                    <th>ERP</th>
                    <th style="width: 120px">Status</th>
                    <th style="width: 160px">Ações</th>
                </tr>
            </ng-template>

            <ng-template pTemplate="body" let-cliente>
                <tr>
                    <td>{{ cliente.idCliente }}</td>
                    <td>
                        <strong>{{ cliente.dscCliente }}</strong>
                    </td>
                    <td>{{ cliente.email || '-' }}</td>
                    <td>{{ cliente.codClienteERP || '-' }}</td>
                    <td>
                        <p-tag [severity]="statusSeverity(cliente.ativo)" [value]="statusLabel(cliente.ativo)"></p-tag>
                    </td>
                    <td>
                        <div class="actions">
                            <button pButton type="button" icon="pi pi-pencil" severity="secondary" [text]="true"
                                (click)="abrirEdicao(cliente)"></button>

                            <button pButton type="button" icon="pi pi-ban" severity="danger" [text]="true"
                                *ngIf="cliente.ativo === 'S'" (click)="desativar(cliente)"></button>

                            <button pButton type="button" icon="pi pi-check" severity="success" [text]="true"
                                *ngIf="cliente.ativo === 'N'" (click)="ativar(cliente)"></button>
                        </div>
                    </td>
                </tr>
            </ng-template>

            <ng-template pTemplate="emptymessage">
                <tr>
                    <td colspan="6" class="empty-message">
                        Nenhum cliente cadastrado.
                    </td>
                </tr>
            </ng-template>
        </p-table>
    </div>

    <p-dialog [(visible)]="modalVisivel" [modal]="true" [draggable]="false" [resizable]="false"
        [style]="{ width: '520px' }" [header]="clienteEditando ? 'Editar cliente' : 'Novo cliente'">
        <form class="dialog-form" (ngSubmit)="salvar()">
            <div class="form-field">
                <label>Nome do cliente *</label>
                <input pInputText name="dscCliente" [(ngModel)]="form.dscCliente" autocomplete="off" />
            </div>

            <div class="form-field">
                <label>Email</label>
                <input pInputText name="email" [(ngModel)]="form.email" autocomplete="off" />
            </div>

            <div class="form-field">
                <label>Código ERP</label>
                <input pInputText name="codClienteERP" [(ngModel)]="form.codClienteERP" autocomplete="off" />
            </div>

            <div class="form-field" *ngIf="clienteEditando">
                <label>Status</label>
                <select name="ativo" [(ngModel)]="form.ativo">
                    <option value="S">Ativo</option>
                    <option value="N">Inativo</option>
                </select>
            </div>

            <div class="dialog-actions">
                <button pButton type="button" label="Cancelar" severity="secondary" [outlined]="true"
                    (click)="modalVisivel = false"></button>

                <button pButton type="submit" label="Salvar" icon="pi pi-save" [loading]="salvando"></button>
            </div>
        </form>
    </p-dialog>
</div>
