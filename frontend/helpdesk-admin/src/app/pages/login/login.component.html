<div class="login-page">
  <div class="login-card">
    <div class="login-brand">
      <div class="login-logo">
        <i class="pi pi-ticket"></i>
      </div>

      <h1>HelpDesk Admin</h1>
      <p>Acesse sua central de atendimento</p>
    </div>

    <div *ngIf="erro" class="login-error">
      <p-message severity="error" [text]="erro"></p-message>
    </div>

    <form class="login-form" (ngSubmit)="entrar()">
      <div class="form-field">
        <label>Código de acesso</label>
        <input pInputText name="codigoAcesso" [(ngModel)]="codigoAcesso" autocomplete="off" />
      </div>

      <div class="form-field">
        <label>Usuário</label>
        <input pInputText name="usuario" [(ngModel)]="usuario" autocomplete="off" />
      </div>

      <div class="form-field">
        <label>Senha</label>
        <p-password name="senha" [(ngModel)]="senha" [feedback]="false" [toggleMask]="true" styleClass="password-field"
          inputStyleClass="password-input"></p-password>
      </div>

      <button pButton type="submit" label="Entrar" icon="pi pi-sign-in" class="login-button"
        [loading]="carregando"></button>
    </form>
  </div>
</div>
