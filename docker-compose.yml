services:
  mysql:
    image: mysql:8.4
    container_name: helpdesk-mysql
    restart: always
    environment:
      MYSQL_DATABASE: helpdesk
      MYSQL_USER: helpdesk_user
      MYSQL_PASSWORD: helpdesk123
      MYSQL_ROOT_PASSWORD: root123
    ports:
      - "3306:3306"
    volumes:
      - helpdesk_mysql_data:/var/lib/mysql

volumes:
  helpdesk_mysql_data: